name: my_travel
description: "MyTravel - Gestionale trasferte per professionisti"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  google_sign_in: ^6.3.0

  # --- Firebase ---
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # --- State Management ---
  provider: ^6.0.0

  # --- Navigazione ---
  go_router: ^14.0.0

  # --- UI ---
  cupertino_icons: ^1.0.8
  table_calendar: ^3.2.0
  cached_network_image: ^3.4.1

  # --- Nativi ---
  image_picker: ^1.2.1
  google_maps_flutter: ^2.17.0
  flutter_local_notifications: ^17.2.4
  geolocator: ^14.0.2
  url_launcher: ^6.3.2

  # --- PDF ---
  pdf: ^3.12.0
  printing: ^5.14.3

  # --- Utility ---
  intl: 0.20.2
  uuid: ^4.5.1
  google_generative_ai: ^0.4.7
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
