name: my_travel
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0

  # Navigazione
  go_router: ^14.0.0

  # State management
  provider: ^6.0.0

  # Calendario
  table_calendar: ^3.0.9

  # Immagini con cache
  cached_network_image: ^3.3.0

  # PDF
  pdf: ^3.10.0
  printing: ^5.12.0

  # Notifiche locali
  flutter_local_notifications: ^17.0.0

  # Camera e galleria per scontrini
  image_picker: ^1.0.0

  # Google Maps
  google_maps_flutter: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true